services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      # Persists the SQLite database across container rebuilds.
      - app_data:/app/data
    expose:
      - "3000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Consumed by the Caddyfile; set APP_DOMAIN in .env.production.
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  app_data:
  caddy_data:
  caddy_config:
