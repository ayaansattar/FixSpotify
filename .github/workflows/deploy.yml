name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys run at once; let an in-progress deploy finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ensure rsync on server
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "command -v rsync >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y rsync; }"

      - name: Sync code to server
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude 'out' \
            --exclude 'spotify_history' \
            --exclude '.env' \
            --exclude '.env.production' \
            --exclude 'prisma/*.db' \
            --exclude 'prisma/*.db-journal' \
            --exclude 'src/generated' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/FixSpotify/"

      - name: Rebuild and restart
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd ~/FixSpotify && docker compose --env-file .env.production up -d --build && docker image prune -f"
